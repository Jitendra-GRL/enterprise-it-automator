# Weekly dependency-update PRs. Each lands as a normal PR through ci.yml's
# full gate (lint, mypy, tests+coverage, pip-audit) — an update that breaks
# anything simply doesn't merge. Grouped to keep the noise down: one PR per
# ecosystem per week, not one per package.
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
