# Alembic configuration — versioned schema migrations (the enterprise path;
# see migrations/env.py for how this coexists with init_db()'s create_all).
#
# No database URL here on purpose: migrations/env.py pulls it from the same
# app Settings (DATABASE_URL env var / .env) the application itself uses, so
# alembic can never migrate a different database than the app would run
# against.

[alembic]
script_location = migrations
# Template for new revision files: readable date-prefixed slugs.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
