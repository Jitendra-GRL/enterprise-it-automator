apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eit.fullname" . }}
  labels:
    {{- include "eit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "eit.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eit.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.service.port | quote }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Long agent runs drain on SIGTERM — matches gunicorn's
      # --graceful-timeout 90 in the image (see Dockerfile).
      terminationGracePeriodSeconds: 100
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.mcpSidecar.enabled }}
            - name: MCP_TRANSPORT
              value: http
            - name: MCP_SERVER_URL
              value: "http://127.0.0.1:{{ .Values.mcpSidecar.port }}/mcp"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.mcpSidecar.enabled }}
        - name: mcp-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["python", "-m", "app.mcp_server.server", "--transport", "http"]
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            - name: MCP_TRANSPORT
              value: http
            - name: MCP_SERVER_HOST
              value: "127.0.0.1"  # pod-local only — never on the pod network
            - name: MCP_SERVER_PORT
              value: {{ .Values.mcpSidecar.port | quote }}
            - name: MCP_ALLOWED_HOSTS
              value: "127.0.0.1:{{ .Values.mcpSidecar.port }},localhost:{{ .Values.mcpSidecar.port }}"
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        {{- end }}
