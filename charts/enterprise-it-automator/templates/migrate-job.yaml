{{- if .Values.migrations.enabled }}
# Runs `alembic upgrade head` BEFORE pods from this release roll out
# (pre-install/pre-upgrade hook) — schema changes land via the reviewed,
# versioned migration chain, and a failed migration blocks the rollout
# instead of shipping pods against a half-migrated database.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "eit.fullname" . }}-migrate
  labels:
    {{- include "eit.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "eit.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
{{- end }}
