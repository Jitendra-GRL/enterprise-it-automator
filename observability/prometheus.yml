# Prometheus config for the compose "observability" profile
# (docker-compose.observability.yml). Scrapes the app's /metrics
# (app/metrics.py) over the internal compose network.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: it-automator-api
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
